syntax = "proto3";

package balance;

option go_package = "github.com/Cheasezz/balanceSrvc/protos/gen/balanceSrvc/;blnc";
option optimize_for = SPEED;

service Balance {
  rpc SystemTransactionTo (SystemTrxToRequest) returns (SystemTrxResponse);
  rpc SystemTransactionFrom (SystemTrxFromRequest) returns (SystemTrxResponse);
  rpc UserTransaction (UserTrxRequest) returns (UserTrxResponse);
  rpc UserBalance (BalanceRequest) returns (BalanceResponse);
}

enum SystemTrxToType {
  SYSTEM_TRX_TO_TYPE_UNKNOWN = 0;
  SYSTEM_TRX_TO_TYPE_DEPOSIT = 1;
  SYSTEM_TRX_TO_TYPE_REWARD = 2;
}

enum SystemTrxFromType {
  SYSTEM_TRX_FROM_TYPE_UNKNOWN = 0;
  SYSTEM_TRX_FROM_TYPE_WITHDRAWAL = 1;
  SYSTEM_TRX_FROM_TYPE_SUBSCRIBE = 2;
}

enum UserTrxType {
  USER_TRX_TYPE_UNKNOWN = 0;
  USER_TRX_TYPE_TRANSFER = 1;
}

message SystemTrxToRequest {
  string user_id = 1;
  SystemTrxToType system_trx_type = 2;
  uint64 amount = 3;
}

message SystemTrxFromRequest {
  string user_id = 1;
  SystemTrxFromType system_trx_type = 2;
  uint64 amount = 3;
}

message SystemTrxResponse {}

message UserTrxRequest {
  string sender_id = 1;
  string resipient_id = 2;
  UserTrxType user_trx_type = 3;
  uint64 amount = 4;
}

message UserTrxResponse {}

message BalanceRequest {
  string user_id = 1;
}

message BalanceResponse {
  uint64 balance = 1;
}